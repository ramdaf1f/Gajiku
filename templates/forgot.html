{% extends "base.html" %}
{% block title %}Lupa Password • GajiKu{% endblock %}
{% block content %}
<section class="card glass" style="max-width:760px;margin:auto">
  <h1 class="login-header">
    <span>Lupa Password</span>
    <img src="{{ url_for('static', filename='img/logo_gjku.png') }}" alt="Logo GajiKu" class="login-logo">
  </h1>
  <p class="muted">Masukkan email akun Anda. Kami akan mengirimkan password baru.</p>
  <form method="post" class="grid" style="grid-template-columns:1fr;gap:12px">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <label>Email</label>
    <input type="email" name="email" placeholder="nama@perusahaan.com" required>

    <div class="btn-row" style="grid-template-columns:1fr">
      <button type="submit" class="btn btn-eq">Kirim Password Baru</button>
    </div>
  </form>

  <p style="text-align:center; margin-top:10px;">
    <a class="btn-ghost-link" href="{{ url_for('web.login') }}">Kembali ke Login</a>
  </p>
</section>
{% endblock %}
