<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <title>{% block title %}GajiKu (Mode Proyek){% endblock %}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <link href="{{ url_for('static', filename='style.css') }}?v=20250104" rel="stylesheet">
</head>
<body class="{% block body_class %}{% endblock %}">
  <script>
    (function(){
      try{
        if(localStorage.getItem('gajiku-theme') === 'new'){
          document.body.classList.add('theme-new');
        }
      }catch(e){}
    })();
  </script>
  <div class="bg-orb bg-orb--navy" aria-hidden="true"></div>
<header class="topbar">
  <div class="brand">
    <img src="{{ url_for('static', filename='img/logorow-gajiku.png') }}" alt="Logo GajiKu" class="brand-logo">
  </div>
  <div class="topbar-actions">
    <div class="toggle" id="theme-toggle" role="button" aria-label="Toggle theme" aria-pressed="false" tabindex="0">
      <div class="handle"></div>
      <span id="theme-toggle-label">Legacy</span>
    </div>
  </div>
</header>

<main class="container">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <div class="flash">
        {% for cat, msg in messages %}
          <div class="alert {{ cat }}">{{ msg }}</div>
        {% endfor %}
      </div>
    {% endif %}
  {% endwith %}

  {% block content %}{% endblock %}
</main>

<footer class="footer">
  <img src="{{ url_for('static', filename='img/logogajiku.png') }}" alt="Logo GajiKu" class="footer-logo">
  <p>APLIKASI GajiKu 2026 by : <b>Fhr'nDhan</b></p>
</footer>

<script src="{{ url_for('static', filename='app.js') }}?v=20260107"></script>
</body>
</html>
